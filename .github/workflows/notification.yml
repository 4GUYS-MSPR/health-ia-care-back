name: Notifications

on:
  workflow_run:
    workflows:
      - pylint
    types:
      - completed
    branches: 
      - main


jobs:
  discord:
    runs-on: 
      - ubuntu-latest
    steps:
      - name: Send a discord notification
        uses: sarisia/actions-status-discord@v1
        with: 
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ github.event.workflow_run.conclusion }}
          title: "Rapport de déploiement"
          description: |
            **Résultat de la CI** : ${{ github.event.workflow_run.conclusion == 'success' && 'Succès' || 'Echec' }}
            **Lien vers le run** : [Voir les détails](${{ github.event.workflow_run.html_url }})
            **Déclenché par** : ${{ github.event.workflow_run.head_commit.author.name }}
